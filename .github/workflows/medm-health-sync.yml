name: MedM Health sync dry run

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Optional backfill window in local days. Leave blank for full history."
        required: false
        default: ""
      dry_run:
        description: "Run without writing to Supabase"
        required: false
        default: "true"
  schedule:
    - cron: "17 10 * * *"

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEDM_EMAIL: ${{ secrets.MEDM_EMAIL }}
      MEDM_PASSWORD: ${{ secrets.MEDM_PASSWORD }}
      MEDM_RECORD_ID: ${{ secrets.MEDM_RECORD_ID }}
      MEDM_SYNC_TIMEOUT_SECONDS: "180"
      MEDM_SYNC_POLL_SECONDS: "10"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_METRICS_USER_ID: ${{ vars.SUPABASE_METRICS_USER_ID }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$MEDM_EMAIL"
          test -n "$MEDM_PASSWORD"
          test -n "$MEDM_RECORD_ID"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run parser tests
        run: npm run test:medm

      - name: Dry-run MedM portal sync
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run != 'false' }}
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.days }}" ]; then
            npm run medm:sync:dry-run -- --days "${{ github.event.inputs.days }}"
          else
            npm run medm:sync:dry-run -- --lifetime
          fi

      - name: Import MedM portal sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false' }}
        shell: bash
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$SUPABASE_METRICS_USER_ID"
          if [ -n "${{ github.event.inputs.days }}" ]; then
            npm run medm:sync:import -- --days "${{ github.event.inputs.days }}"
          else
            npm run medm:sync:import -- --lifetime
          fi

      - name: Upload MedM login debug artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: medm-login-debug
          path: |
            local-data/imports/medm-health/debug/login-page.html
            local-data/imports/medm-health/debug/login-page.png
            local-data/imports/medm-health/debug/login-page.txt
          if-no-files-found: ignore
          retention-days: 3
