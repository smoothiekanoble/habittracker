name: iOS build

on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build HabitTracker (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/HabitTracker.xcodeproj \
            -scheme HabitTracker \
            -destination 'generic/platform=iOS Simulator' \
            -resolvePackageDependencies \
            CODE_SIGNING_ALLOWED=NO \
            build
